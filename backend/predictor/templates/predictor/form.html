<!DOCTYPE html>
<html>
<head>
  <title>Heart Disease Risk Prediction</title>
  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: 40px auto;
    }
    label { font-weight: bold; }
    input, select {
      width: 100%;
      padding: 6px;
      margin: 6px 0 14px 0;
    }
    button {
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      padding: 12px;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<h2>Heart Disease Risk Prediction (UCI Dataset)</h2>

<form id="predict-form">

<label>Age</label>
<input type="number" name="age" required>

<label>Sex</label>
<select name="sex" required>
  <option value="Male">Male</option>
  <option value="Female">Female</option>
</select>

<label>Chest Pain Type</label>
<select name="cp" required>
  <option value="typical angina">Typical Angina</option>
  <option value="atypical angina">Atypical Angina</option>
  <option value="non-anginal">Non-Anginal</option>
  <option value="asymptomatic">Asymptomatic</option>
</select>

<label>Resting Blood Pressure</label>
<input type="number" name="trestbps" required>

<label>Cholesterol</label>
<input type="number" name="chol" required>

<label>Fasting Blood Sugar > 120 mg/dl</label>
<select name="fbs" required>
  <option value="True">Yes</option>
  <option value="False">No</option>
</select>

<label>Rest ECG</label>
<select name="restecg" required>
  <option value="normal">Normal</option>
  <option value="lv hypertrophy">LV Hypertrophy</option>
  <option value="st-t abnormality">ST-T Abnormality</option>
</select>

<label>Max Heart Rate Achieved</label>
<input type="number" name="thalch" required>

<label>Exercise Induced Angina</label>
<select name="exang" required>
  <option value="True">Yes</option>
  <option value="False">No</option>
</select>

<label>Oldpeak (ST depression)</label>
<input type="number" step="0.1" name="oldpeak" required>

<label>Slope</label>
<select name="slope" required>
  <option value="upsloping">Upsloping</option>
  <option value="flat">Flat</option>
  <option value="downsloping">Downsloping</option>
</select>

<label>Number of Major Vessels (0–3)</label>
<input type="number" name="ca" min="0" max="3" required>

<label>Thal</label>
<select name="thal" required>
  <option value="normal">Normal</option>
  <option value="fixed defect">Fixed Defect</option>
  <option value="reversable defect">Reversible Defect</option>
</select>

<button type="submit">Predict</button>

</form>

<div id="result"></div>

<script>
document.getElementById("predict-form").addEventListener("submit", async function(e) {
  e.preventDefault();

  const formData = new FormData(this);
  const data = {};

  formData.forEach((value, key) => {
    if (!isNaN(value) && value !== "") {
      data[key] = Number(value);
    } else {
      data[key] = value;
    }
  });

  const response = await fetch("/api/predict/", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const result = await response.json();

  document.getElementById("result").innerHTML = `
    <div style="background:${result.prediction === 1 ? '#fee2e2' : '#d1fae5'}">
      <strong>Risk Level:</strong> ${result.prediction === 1 ? "Heart Disease Detected" : "Low Risk"} <br>
      <strong>Risk Probability:</strong> ${result.risk_probability}%
    </div>
  `;
});
</script>

</body>
</html>
