<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cardiac Arrest Prediction</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 10px;
    }
    label {
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 6px;
      margin-top: 4px;
      margin-bottom: 12px;
      border-radius: 4px;
      border: 1px solid #aaa;
    }
    button {
      padding: 10px 16px;
      font-size: 16px;
      background-color: #0284c7;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0369a1;
    }
    #result {
      margin-top: 20px;
      padding: 12px;
      border-radius: 6px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<h2>🫀 Cardiac Arrest Prediction Form</h2>
<p><em>All fields are mandatory. Sensor data is auto-fetched below.</em></p>

<form id="predict-form">
  <label>Age (in years)</label>
  <input type="number" name="age" required>

  <label>Biological Sex</label>
  <select name="sex" required>
    <option value="">Select</option>
    <option value="1">Male</option>
    <option value="0">Female</option>
  </select>

  <label>Cholesterol Level (mg/dL)</label>
  <input type="number" name="cholesterol" required>

  <label>Do you have Diabetes?</label>
  <select name="diabetes" required>
    <option value="">Select</option>
    <option value="0">No</option>
    <option value="1">Yes</option>
  </select>

  <label>Family History of Heart Problems?</label>
  <select name="family" required>
    <option value="">Select</option>
    <option value="0">No</option>
    <option value="1">Yes</option>
  </select>

  <label>Do you smoke?</label>
  <select name="smoke" required>
    <option value="">Select</option>
    <option value="0">No</option>
    <option value="1">Yes</option>
  </select>

  <label>Consume Alcohol?</label>
  <select name="alcohol" required>
    <option value="">Select</option>
    <option value="0">No</option>
    <option value="1">Yes</option>
  </select>

  <label>Previous Heart Conditions?</label>
  <select name="prev_heart" required>
    <option value="">Select</option>
    <option value="0">No</option>
    <option value="1">Yes</option>
  </select>

  <label>Cardiac Medication?</label>
  <select name="meds" required>
    <option value="">Select</option>
    <option value="0">No</option>
    <option value="1">Yes</option>
  </select>

  <label>Stress Level (1-10)</label>
  <input type="number" name="stress" min="1" max="10" required>

  <label>Physical Activity Days/Week (0-7)</label>
  <input type="number" name="activity" min="0" max="7" required>

  <label>Sleep Hours/Day</label>
  <input type="number" name="sleep" min="1" max="24" required>

  <label>Systolic BP</label>
  <input type="number" name="sbp" required>

  <label>Diastolic BP</label>
  <input type="number" name="dbp" required>

  <button type="submit">Predict Cardiac Risk</button>
</form>

<div id="result"></div>

<h3>Live Sensor Data</h3>
<p>Heart Rate: <span id="heart-rate">Loading...</span> bpm</p>
<p>SpO₂: <span id="spo2">Loading...</span>%</p>
<p>Body Temp: <span id="body-temp">Loading...</span> °C</p>

<script>
  async function fetchSensorData() {
    try {
      const res = await fetch("/api/sensor/");

      if (!res.ok) {
        throw new Error("Sensor API error");
      }

      const data = await res.json();

      document.getElementById("heart-rate").textContent =
        parseFloat(data.heart_rate || 0).toFixed(1);

      document.getElementById("spo2").textContent =
        parseFloat(data.spo2 || 0).toFixed(1);

      document.getElementById("body-temp").textContent =
        parseFloat(data.body_temp || 0).toFixed(1);

    } catch (e) {
      console.error("Sensor fetch error:", e);
      document.getElementById("heart-rate").textContent = "N/A";
      document.getElementById("spo2").textContent = "N/A";
      document.getElementById("body-temp").textContent = "N/A";
    }
  }

  document.getElementById("predict-form").addEventListener("submit", async (event) => {
    event.preventDefault();
    const form = event.target;
    const data = {};

    for (const field of form.elements) {
      if (field.name) data[field.name] = field.value;
    }

    const res = await fetch("/api/predict/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    document.getElementById("result").innerHTML = `
      <div style="background:${result.prediction === 1 ? '#fee2e2' : '#d1fae5'};padding:12px;border-radius:5px">
        <strong>Prediction:</strong> ${
          result.prediction === 1
            ? "Cardiac Risk Detected! Please consult a doctor."
            : "No Immediate Cardiac Risk Detected"
        }
      </div>
    `;
  });

  window.addEventListener("load", fetchSensorData);
</script>

</body>
</html>
