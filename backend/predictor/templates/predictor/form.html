<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heart Disease Risk Prediction</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 25px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background-color: #f9fafb;
    }

    h2 {
      text-align: center;
      margin-bottom: 5px;
    }

    p.subtitle {
      text-align: center;
      color: #555;
      margin-bottom: 25px;
    }

    label {
      font-weight: bold;
      margin-top: 12px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid #bbb;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background-color: #0284c7;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background-color: #0369a1;
    }

    .result-card {
      margin-top: 25px;
      padding: 15px;
      border-radius: 10px;
      font-size: 16px;
    }

    .low { background-color: #d1fae5; }
    .moderate { background-color: #fef3c7; }
    .high { background-color: #fee2e2; }

    .sensor-box {
      margin-top: 30px;
      padding: 15px;
      background-color: #ffffff;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    .sensor-box h3 {
      margin-top: 0;
    }
  </style>
</head>

<body>

<h2>🫀 Heart Disease Risk Prediction</h2>
<p class="subtitle">ML-based risk assessment with real-time IoT monitoring</p>

<form id="predict-form">

  <label>Age</label>
  <input type="number" name="age" required>

  <label>Sex</label>
  <select name="sex" required>
    <option value="">Select</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
  </select>

  <label>Chest Pain Type</label>
  <select name="cp" required>
    <option value="">Select</option>
    <option value="typical angina">typical angina</option>
    <option value="atypical angina">atypical angina</option>
    <option value="non-anginal">non-anginal</option>
    <option value="asymptomatic">asymptomatic</option>
  </select>

  <label>Resting Blood Pressure (mm Hg)</label>
  <input type="number" name="trestbps" required>

  <label>Cholesterol (mg/dL)</label>
  <input type="number" name="chol" required>

  <label>Fasting Blood Sugar > 120 mg/dl</label>
  <select name="fbs" required>
    <option value="">Select</option>
    <option value="True">True</option>
    <option value="False">False</option>
  </select>

  <label>Rest ECG</label>
  <select name="restecg" required>
    <option value="">Select</option>
    <option value="normal">normal</option>
    <option value="lv hypertrophy">lv hypertrophy</option>
    <option value="st-t abnormality">st-t abnormality</option>
  </select>

  <label>Max Heart Rate Achieved</label>
  <input type="number" name="thalch" required>

  <label>Exercise Induced Angina</label>
  <select name="exang" required>
    <option value="">Select</option>
    <option value="True">True</option>
    <option value="False">False</option>
  </select>

  <label>Oldpeak (ST depression)</label>
  <input type="number" step="0.1" name="oldpeak" required>

  <label>Slope</label>
  <select name="slope" required>
    <option value="">Select</option>
    <option value="upsloping">upsloping</option>
    <option value="flat">flat</option>
    <option value="downsloping">downsloping</option>
  </select>

  <label>Number of Major Vessels (0–3)</label>
  <input type="number" name="ca" min="0" max="3" required>

  <label>Thal</label>
  <select name="thal" required>
    <option value="">Select</option>
    <option value="normal">normal</option>
    <option value="fixed defect">fixed defect</option>
    <option value="reversable defect">reversable defect</option>
  </select>

  <button type="submit">Predict Risk</button>

</form>

<div id="result"></div>

<div class="sensor-box">
  <h3>Live IoT Vital Monitoring</h3>
  <p>Heart Rate: <span id="heart-rate">Loading...</span> bpm</p>
  <p>SpO₂: <span id="spo2">Loading...</span>%</p>
  <p>Body Temperature: <span id="body-temp">Loading...</span> °C</p>
</div>

<script>

async function fetchSensorData() {
  try {
    const res = await fetch("/api/sensor/");
    const data = await res.json();

    document.getElementById("heart-rate").textContent =
      parseFloat(data.heart_rate).toFixed(1);

    document.getElementById("spo2").textContent =
      parseFloat(data.spo2).toFixed(1);

    document.getElementById("body-temp").textContent =
      parseFloat(data.body_temp).toFixed(1);

  } catch {
    document.getElementById("heart-rate").textContent = "N/A";
    document.getElementById("spo2").textContent = "N/A";
    document.getElementById("body-temp").textContent = "N/A";
  }
}

document.getElementById("predict-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(e.target);
  const data = {};

  formData.forEach((value, key) => {
    if (!isNaN(value) && value !== "") {
      data[key] = Number(value);
    } else {
      data[key] = value;
    }
  });

  try {
    const res = await fetch("/api/predict/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    if (!res.ok) throw new Error("Prediction API error");

    const result = await res.json();
    console.log("API Response:", result);

    if (result.risk_probability === undefined) {
      document.getElementById("result").innerHTML =
        "<div class='result-card high'>Prediction failed. Check backend response.</div>";
      return;
    }

    const probability = result.risk_probability;

    let riskClass = "";
    let riskLevel = "";

    if (probability < 40) {
      riskClass = "low";
      riskLevel = "Low Risk";
    } else if (probability < 70) {
      riskClass = "moderate";
      riskLevel = "Moderate Risk";
    } else {
      riskClass = "high";
      riskLevel = "High Risk";
    }

    document.getElementById("result").innerHTML = `
      <div class="result-card ${riskClass}">
        <h3>Prediction Result</h3>
        <p><strong>Risk Level:</strong> ${riskLevel}</p>
        <p><strong>Risk Probability:</strong> ${probability}%</p>
        <p style="margin-top:10px;font-size:13px;color:#555;">
⚠️ This prediction is generated by a machine learning model for educational purposes only and should not be considered a medical diagnosis.
</p>
      </div>
    `;

  } catch (error) {
    console.error("Prediction error:", error);
    document.getElementById("result").innerHTML =
      "<div class='result-card high'>Prediction failed. Please try again.</div>";
  }
});

window.addEventListener("load", fetchSensorData);

</script>

</body>
</html>
